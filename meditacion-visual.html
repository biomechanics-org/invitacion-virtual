<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Visual Ritual de Meditación</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090f;
      --panel: #0f1422;
      --accent: #7ef9ff;
      --accent-2: #b38bff;
      --text: #e6ecff;
      --muted: #9aa4c7;
      --ok: #7dffb0;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 800px at 70% 20%, #0b1b3a 0%, #07090f 50%, #040509 100%);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 16px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 20, 34, 0.7);
      border: 1px solid rgba(126, 249, 255, 0.15);
      padding: 12px 16px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    header h1 {
      font-size: 16px;
      margin: 0;
      letter-spacing: 0.3px;
      font-weight: 600;
    }
    header .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button, input[type="range"], input[type="file"] {
      background: var(--panel);
      color: var(--text);
      border: 1px solid rgba(126, 249, 255, 0.2);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
    }
    button {
      cursor: pointer;
      transition: transform 0.2s ease, border 0.2s ease;
    }
    button:hover { transform: translateY(-1px); border-color: rgba(126, 249, 255, 0.45); }
    .stat {
      font-size: 12px;
      color: var(--muted);
    }
    .stat strong { color: var(--ok); }
    #visual {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      border: 1px solid rgba(126, 249, 255, 0.15);
      background: rgba(7, 9, 15, 0.8);
      display: block;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Visual Ritual • Estado Mental</h1>
      <div class="hint">Carga un CSV y genera una visual abstracta sincronizada para grabar tu meditación.</div>
    </div>
    <div class="controls">
      <input id="fileInput" type="file" accept=".csv" />
      <button id="playBtn">▶ Reproducir</button>
      <button id="resetBtn">⟲ Reiniciar</button>
      <button id="fullscreenBtn">⛶ Pantalla completa</button>
      <label class="stat">Velocidad <input id="speed" type="range" min="0.25" max="3" step="0.05" value="1" /></label>
      <label class="stat">Suavizado <input id="smoothing" type="range" min="0" max="0.9" step="0.05" value="0.35" /></label>
      <div class="stat">Estado: <strong id="status">sin datos</strong></div>
    </div>
  </header>

  <canvas id="visual"></canvas>

  <script src="meditacion-visual.js"></script>
</body>
</html>
